<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>Left Lane</title>
    <!-- Prevent dark-mode flash + apply saved primary color before React mounts -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 31,30 1,30' fill='%231a1a1a' stroke='%23ffffff' stroke-width='1'/%3E%3Cpolygon points='16,10 21,26 11,26' fill='none' stroke='%23F48525' stroke-width='1.5'/%3E%3Cline x1='16' y1='14' x2='16' y2='24' stroke='%23F48525' stroke-width='1.5' stroke-dasharray='2,2'/%3E%3C/svg%3E"
    />
    <link rel="shortcut icon" href="/logoBrowser.png?v=2" />
    <!-- Work Sans font (used by homepage design) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
